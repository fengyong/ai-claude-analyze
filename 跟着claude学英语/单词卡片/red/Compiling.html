<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compiling - 跟着 Claude 学英语</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg-deep: #1f0a0a;
    --bg-mid: #2d1515;
    --accent: #f87171;
    --accent-light: #fecaca;
    --accent-dark: #dc2626;
    --text-primary: #ffffff;
    --text-secondary: rgba(255,255,255,0.7);
    --text-muted: rgba(255,255,255,0.45);
  }
  
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', 'Noto Sans SC', sans-serif; }
  
  .card {
    width: 1080px; height: 1920px; position: relative; overflow: hidden;
    background: linear-gradient(180deg, #1f0a0a 0%, #2d1515 30%, #261212 70%, #150505 100%);
  }
  
  .blur-orb {
    position: absolute; border-radius: 50%;
    filter: blur(120px);
    opacity: 0.35;
    animation: float 8s ease-in-out infinite;
  }
  .orb-1 { width: 500px; height: 500px; background: #f87171; top: -150px; right: -100px; animation-delay: 0s; }
  .orb-2 { width: 400px; height: 400px; background: #dc2626; bottom: 200px; left: -100px; animation-delay: -3s; }
  .orb-3 { width: 300px; height: 300px; background: #fca5a5; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -5s; opacity: 0.2; }
  
  @keyframes float {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(30px, -30px); }
  }
  
  .grid-overlay {
    position: absolute; inset: 0;
    background-image: 
      linear-gradient(rgba(248, 113, 113, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(248, 113, 113, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  
  .content {
    position: relative; z-index: 10;
    padding: 140px 70px 120px;
    height: 100%;
    display: flex; flex-direction: column;
  }
  
  .card-label {
    font-size: 22px; font-weight: 500;
    color: rgba(248, 113, 113, 0.7);
    letter-spacing: 3px;
    margin-bottom: 50px;
    text-transform: uppercase;
  }
  
  .word-title {
    font-size: 110px; font-weight: 900;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1.1;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #fff 0%, #fecaca 50%, #f87171 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  .ipa {
    font-size: 38px; font-weight: 400;
    color: rgba(255,255,255,0.6);
    font-family: 'Inter', sans-serif;
    margin-bottom: 15px;
    letter-spacing: 1px;
  }
  
  .chinese {
    font-size: 48px; font-weight: 700;
    color: #f87171;
    margin-bottom: 50px;
    letter-spacing: 2px;
  }
  
  .divider {
    width: 120px; height: 4px;
    background: linear-gradient(90deg, #f87171, transparent);
    margin-bottom: 50px;
    border-radius: 2px;
  }
  
  .example-box {
    background: rgba(248, 113, 113, 0.08);
    border-left: 4px solid #f87171;
    padding: 35px 40px;
    margin-bottom: 45px;
    border-radius: 0 16px 16px 0;
  }
  
  .example-text {
    font-size: 34px;
    color: rgba(255,255,255,0.9);
    line-height: 1.6;
    font-style: italic;
  }
  
  .section {
    margin-bottom: 35px;
  }
  
  .section-title {
    font-size: 24px; font-weight: 700;
    color: #f87171;
    margin-bottom: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  
  .section-content {
    font-size: 39px;
    color: rgba(255,255,255,0.85);
    line-height: 1.7;
  }
  
  .hl { color: #fecaca; font-weight: 600; }
  
  .did-you-know {
    background: linear-gradient(135deg, rgba(248, 113, 113, 0.12), rgba(220, 38, 38, 0.08));
    border: 1px solid rgba(248, 113, 113, 0.25);
    border-radius: 20px;
    padding: 35px 40px;
    margin-top: 20px;
  }
  
  .did-you-know-title {
    font-size: 26px; font-weight: 800;
    color: #fecaca;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 12px;
  }
  
  .did-you-know-title::before {
    content: "💡";
    font-size: 28px;
  }
  
  .did-you-know-content {
    font-size: 28px;
    color: rgba(255,255,255,0.8);
    line-height: 1.7;
  }
  
  .did-you-know-content p {
    margin-bottom: 12px;
  }
  
  .did-you-know-content p:last-child {
    margin-bottom: 0;
  }
</style>
</head>
<body>
<div class="card">
  <div class="blur-orb orb-1"></div>
  <div class="blur-orb orb-2"></div>
  <div class="blur-orb orb-3"></div>
  <div class="grid-overlay"></div>
  
  <div class="content">
    <div class="card-label">TECH · 2 / 8</div>
    
    <div class="word-title">Compiling</div>
    <div class="ipa">/kəmˈpaɪlɪŋ/</div>
    <div class="chinese">编译 · 汇编</div>
    
    <div class="divider"></div>
    
    <div class="example-box">
      <div class="example-text">"The project is compiling, please wait."</div>
    </div>
    
    <div class="section">
      <div class="section-title">WORD MEANING</div>
      <div class="section-content">将源代码转换为机器可执行代码的过程。</div>
    </div>
    
    <div class="section">
      <div class="section-title">USAGE</div>
      <div class="section-content">常见搭配：compile code（编译代码）、compiler（编译器）</div>
    </div>
    
    <div class="did-you-know">
      <div class="did-you-know-title">DID YOU KNOW?</div>
      <div class="did-you-know-content">
        <p><span class="hl">词源：</span>来自拉丁语 compilare（收集、掠夺），原意是'收集资料'。</p>
        <p><span class="hl">记忆技巧：</span>编译型语言(C/Java)需 compile，解释型语言(Python)直接运行。</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
